        }

        }
        .back-link:hover {
            text-decoration: underline;
        }

    <script>
        function changeLanguage() {
            var lang = document.getElementById('lang-select').value;
            if (lang === 'zh') {
                document.title = '你听到的是哪一个？';
                document.getElementById('page-title').textContent = '你听到的是哪一个？';
                document.getElementById('submit-btn').textContent = '完成';
                document.getElementById('back-link').textContent = '返回课程列表';
            } else if (lang === 'en') {
                document.title = 'Which one do you hear?';
                document.getElementById('page-title').textContent = 'Which one do you hear?';
                document.getElementById('submit-btn').textContent = 'Submit';
                document.getElementById('back-link').textContent = 'Back to Course List';
            }
        }
        
        // 正确答案
        const correctAnswers = ['a', 'e', 'o', 'a', 'o', 'e'];
        
        function checkAnswers() {
            let correctCount = 0;
            for (let i = 1; i <= 6; i++) {
                const selected = document.getElementById(`option-${i}`).value;
                const resultElement = document.getElementById(`result-${i}`);
                
                if (selected === correctAnswers[i-1]) {
                    resultElement.textContent = '✅';
                    resultElement.style.color = 'green';
                    correctCount++;
                } else {
                    resultElement.textContent = '❌';
                    resultElement.style.color = 'red';
                }
            }
            
            // 显示结果提示
            let feedbackElement = document.getElementById('feedback');
            if (!feedbackElement) {
                feedbackElement = document.createElement('div');
                feedbackElement.id = 'feedback';
                feedbackElement.style.marginLeft = '20px';
                feedbackElement.style.fontSize = '16px';
                document.getElementById('submit-btn').parentElement.appendChild(feedbackElement);
            }
            
            if (correctCount >= 5) {
                feedbackElement.textContent = '很棒！正确率大于75%！再接再厉！';
                feedbackElement.style.color = 'green';
            } else {
                feedbackElement.textContent = '没关系，再听一次。';
                feedbackElement.style.color = 'red';
            }
        }
    </script>
